name: Build and deploy

# Rebuild hourly from the published Google Sheet, plus on push and on demand.
# The build validates before rendering: any data error exits non-zero, the
# job fails, and the deploy job never runs — production stays untouched.
on:
  schedule:
    - cron: "7 * * * *"  # hourly (:07 to dodge the on-the-hour cron rush)
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # the build commits the data/canonical/ snapshot back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build site (fetch -> validate -> snapshot -> render)
        run: python build.py
      - name: Commit data snapshot
        # data/canonical/ is the audit log of every data change and the
        # baseline for the validator's deletion-drift check. Only commits
        # when the sheet actually changed. GITHUB_TOKEN pushes don't
        # retrigger workflows, so this can't loop.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/canonical
          if ! git diff --cached --quiet; then
            git commit -m "data snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main
            git push
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
