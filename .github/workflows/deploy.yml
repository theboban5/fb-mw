name: Build and deploy

# Manual / on-push rebuilds (per project decision). Push code or click
# "Run workflow" to publish the latest scores from the Google Sheet.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build site
        env:
          CSV_URL_TEAMS: ${{ secrets.CSV_URL_TEAMS }}
          CSV_URL_MATCHES: ${{ secrets.CSV_URL_MATCHES }}
          SL_CSV_TEAMS: ${{ secrets.SL_CSV_TEAMS }}
          SL_CSV_MATCHES: ${{ secrets.SL_CSV_MATCHES }}
          NDL_CSV_TEAMS: ${{ secrets.NDL_CSV_TEAMS }}
          NDL_CSV_MATCHES: ${{ secrets.NDL_CSV_MATCHES }}
          WP_CSV_TEAMS: ${{ secrets.WP_CSV_TEAMS }}
          WP_CSV_MATCHES: ${{ secrets.WP_CSV_MATCHES }}
        run: python build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
