<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>{{TITLE}} &middot; {{LEAGUE_NAME}}</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <h1>{{LEAGUE_NAME}}</h1>
  <p class="updated">Last updated {{LAST_UPDATED}}</p>
</header>
<nav class="tabs">
{{NAV}}
</nav>
<main>
{{CONTENT}}
</main>
<footer class="site-footer">
  <p>{{LEAGUE_NAME}} &middot; results reported by team reps</p>
</footer>
<div id="theme-bar" aria-label="Switch design variant">
  <span class="theme-label">Design</span>
  <button data-t="v2">A</button>
  <button data-t="v3">B</button>
  <button data-t="v1">C</button>
</div>
<script>
(function(){
  var bar=document.getElementById('theme-bar');
  var btns=bar.querySelectorAll('button');
  function apply(t){
    document.body.dataset.theme=t;
    btns.forEach(function(b){b.classList.toggle('active',b.dataset.t===t);});
    try{localStorage.setItem('fbmw-theme',t);}catch(e){}
  }
  var saved;try{saved=localStorage.getItem('fbmw-theme');}catch(e){}
  apply(saved||'v2');
  btns.forEach(function(b){b.addEventListener('click',function(){apply(b.dataset.t);});});
})();
</script>
</body>
</html>
