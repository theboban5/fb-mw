<script>
(function(){
  var pager=document.querySelector('.v2-content [data-md-pager]');
  if(!pager) return;
  var groups=document.querySelectorAll('.v2-content .v2-md-group');
  var chips=[].slice.call(pager.querySelectorAll('[data-md-chip]'));
  if(chips.length<2) return; // single matchday: leave full view, pager hidden
  var mds=chips.map(function(c){return +c.dataset.mdChip;}).sort(function(a,b){return a-b;});
  var prev=pager.querySelector('[data-md-prev]');
  var next=pager.querySelector('[data-md-next]');
  var idx;
  function select(i){
    idx=Math.max(0,Math.min(mds.length-1,i));
    var md=mds[idx];
    groups.forEach(function(g){g.hidden=(+g.dataset.md!==md);});
    chips.forEach(function(c){
      var on=(+c.dataset.mdChip===md);
      c.classList.toggle('active',on);
      if(on){c.setAttribute('aria-current','true');c.scrollIntoView({inline:'center',block:'nearest'});}
      else{c.removeAttribute('aria-current');}
    });
    prev.disabled=(idx<=0);
    next.disabled=(idx>=mds.length-1);
  }
  chips.forEach(function(c){c.addEventListener('click',function(){select(mds.indexOf(+c.dataset.mdChip));});});
  prev.addEventListener('click',function(){select(idx-1);});
  next.addEventListener('click',function(){select(idx+1);});
  var di=mds.indexOf(+pager.dataset.mdDefault);
  pager.hidden=false;
  select(di>=0?di:mds.length-1); // open on the live edge (next unplayed round)
})();
</script>
